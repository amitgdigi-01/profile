<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">My Profile</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": ""}'></script>
</head>

<body>
    <div class="mobile-content">
        <!-- Biodata Section -->
        <header class="biodata-section">
            <div class="profile-photo">
                <img src="amit1.jpeg" alt="Passport Photo" id="profile-img">
            </div>
            <div class="biodata-info">
                <h1 id="profile-name">Your Name</h1>
                <p class="age" id="profile-age">Age: 25</p>
                <p class="occupation" id="profile-occupation">Software Developer</p>
                <p class="bio" id="profile-bio">A brief description about yourself goes here.</p>
                <div class="contact-info">
                    <a href="mailto:your.email@example.com" id="profile-email">your.email@example.com</a>
                    <a href="tel:+1234567890" id="profile-phone">+1 234 567 890</a>
                </div>
                <div class="social-links" id="social-links-container">
                    <a href="#" target="_blank" id="social-linkedin">LinkedIn</a>
                    <a href="#" target="_blank" id="social-twitter">Twitter</a>
                </div>
            </div>
        </header>

        <!-- Image Gallery -->
        <section class="gallery">
            <div class="image-container">
                <img src="amit2.jpeg" alt="Full Screen Image 2" class="gallery-img" draggable="false">
                <span class="watermark" id="watermark-2">Your Name</span>
            </div>
            <div class="image-container">
                <img src="amit3.jpeg" alt="Full Screen Image 3" class="gallery-img" draggable="false">
                <span class="watermark" id="watermark-3">Your Name</span>
            </div>
            <div class="image-container">
                <img src="amit4.jpeg" alt="Full Screen Image 1" class="gallery-img" draggable="false">
                <span class="watermark" id="watermark-1">Your Name</span>
            </div>
            <div class="image-container">
                <img src="amit5.jpeg" alt="Full Screen Image 1" class="gallery-img" draggable="false">
                <span class="watermark" id="watermark-1">Your Name</span>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 Your Name</p>
        </footer>
    </div>

    <!-- Configuration (must load first) -->
    <script src="config.js"></script>

    <!-- Apply configuration to page -->
    <script>
        // Update page title
        document.getElementById('page-title').textContent = CONFIG.biodata.name + ' - Profile';

        // Update biodata
        document.getElementById('profile-name').textContent = CONFIG.biodata.name;
        document.getElementById('profile-age').textContent = 'Age: ' + CONFIG.biodata.age;
        document.getElementById('profile-occupation').textContent = CONFIG.biodata.occupation;
        document.getElementById('profile-bio').textContent = CONFIG.biodata.bio;
        document.getElementById('profile-email').textContent = CONFIG.biodata.email;
        document.getElementById('profile-email').href = 'mailto:' + CONFIG.biodata.email;
        document.getElementById('profile-phone').textContent = CONFIG.biodata.phone;
        document.getElementById('profile-phone').href = 'tel:' + CONFIG.biodata.phone.replace(/\s/g, '');

        // Update social links
        const socialContainer = document.getElementById('social-links-container');
        if (CONFIG.social.linkedin) {
            document.getElementById('social-linkedin').href = CONFIG.social.linkedin;
            document.getElementById('social-linkedin').style.display = 'inline-block';
        } else {
            document.getElementById('social-linkedin').style.display = 'none';
        }
        if (CONFIG.social.twitter) {
            document.getElementById('social-twitter').href = CONFIG.social.twitter;
            document.getElementById('social-twitter').style.display = 'inline-block';
        } else {
            document.getElementById('social-twitter').style.display = 'none';
        }
        if (!CONFIG.social.linkedin && !CONFIG.social.twitter) {
            socialContainer.style.display = 'none';
        }

        // Update watermarks
        document.getElementById('watermark-1').textContent = CONFIG.watermark;
        document.getElementById('watermark-2').textContent = CONFIG.watermark;
        document.getElementById('watermark-3').textContent = CONFIG.watermark;

        // Update footer
        document.querySelector('footer p').textContent = '© 2026 ' + CONFIG.biodata.name;

        // Update Cloudflare analytics token
        if (CONFIG.cloudflareToken && CONFIG.cloudflareToken !== 'YOUR_CLOUDFLARE_TOKEN_HERE') {
            document.querySelector('script[data-cf-beacon]').setAttribute('data-cf-beacon', JSON.stringify({ token: CONFIG.cloudflareToken }));
        }
    </script>

    <!-- Visitor Tracking Script -->
    <script>
        // ========== VISITOR TRACKING ==========
        let startTime = Date.now();
        let pageVisible = true;
        let loggedInitial = false;

        // Track page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                pageVisible = false;
            }
        });

        // Get browser info
        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let browser = 'Unknown';

            if (ua.indexOf('Firefox') > -1) browser = 'Firefox';
            else if (ua.indexOf('Chrome') > -1) browser = 'Chrome';
            else if (ua.indexOf('Safari') > -1) browser = 'Safari';
            else if (ua.indexOf('Edge') > -1) browser = 'Edge';
            else if (ua.indexOf('Opera') > -1) browser = 'Opera';
            else if (ua.indexOf('MSIE') > -1 || ua.indexOf('Trident') > -1) browser = 'IE';

            return browser;
        }

        // Get device type
        function getDeviceType() {
            const ua = navigator.userAgent;
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) {
                return 'Tablet';
            }
            if (/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Silk-Accelerated|(hpw|web)OS|Opera M(obi|ini)/.test(ua)) {
                return 'Mobile';
            }
            return 'Desktop';
        }

        // Get visitor IP and location via ip-api.com (free, 1000 requests/day)
        async function getVisitorInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip || 'Unknown',
                    city: data.city || 'Unknown',
                    country: data.country_name || 'Unknown'
                };
            } catch (e) {
                console.log('IP lookup failed, trying fallback...');
                try {
                    const response = await fetch('http://ip-api.com/json/?fields=status,message,country,city,query');
                    const data = await response.json();
                    return {
                        ip: data.query || 'Unknown',
                        city: data.city || 'Unknown',
                        country: data.country || 'Unknown'
                    };
                } catch (e2) {
                    console.log('All IP lookups failed');
                    return { ip: 'Unknown', city: 'Unknown', country: 'Unknown' };
                }
            }
        }

        // Send data to Google Sheets
        async function logVisitor(visitorData) {
            const url = (typeof CONFIG !== 'undefined') ? CONFIG.appsScriptUrl : null;

            if (!url || url === 'YOUR_APPS_SCRIPT_WEB_APP_URL') {
                console.log('Apps Script URL not configured. Skipping logging.');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('referrer', visitorData.url);

                await fetch(url + '?referrer=' + encodeURIComponent(visitorData.url), {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(visitorData)
                });
            } catch (e) {
                console.log('Failed to log visitor:', e);
            }
        }

        // Track visitor on page load
        (async function () {
            const browser = getBrowserInfo();
            const device = getDeviceType();
            const location = await getVisitorInfo();

            const visitorData = {
                ip: location.ip,
                city: location.city,
                country: location.country,
                device: device,
                browser: browser,
                timeSpent: 0,
                url: window.location.href,
                referrer: document.referrer || 'Direct'
            };

            // Log initial visit
            logVisitor(visitorData);
            loggedInitial = true;

            // Log time spent when leaving
            window.addEventListener('beforeunload', () => {
                if (loggedInitial) {
                    const timeSpent = Math.round((Date.now() - startTime) / 1000);
                    visitorData.timeSpent = timeSpent;
                    logVisitor(visitorData);
                }
            });
        })();
    </script>

    <!-- Content Protection Script -->
    <script>
        // Disable right-click
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });

        // Disable image drag
        document.addEventListener('dragstart', (e) => {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
                return false;
            }
        });

        // Disable image selection
        document.addEventListener('selectstart', (e) => {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
                return false;
            }
        });

        // Disable touch hold on images (mobile)
        document.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>

</html>
